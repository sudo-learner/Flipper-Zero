  <text x="600" y="200" text-anchor="middle" font-family="Inter,sans-serif" font-size="60" font-weight="700" fill="#e8e8f0">See how wireless</text>
  <text x="600" y="275" text-anchor="middle" font-family="Inter,sans-serif" font-size="60" font-weight="700" fill="#00e676">attacks work</text>
  <!-- Subtitle -->
  <text x="600" y="335" text-anchor="middle" font-family="Inter,sans-serif" font-size="21" fill="#8888aa">Live signal animations — every click shows the full journey</text>
  <!-- Module pills -->
  <rect x="120" y="385" width="150" height="38" rx="19" fill="rgba(79,195,247,0.12)" stroke="rgba(79,195,247,0.3)" stroke-width="1"/>
  <text x="195" y="410" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#4fc3f7">📡  Sub-GHz</text>
  <rect x="290" y="385" width="150" height="38" rx="19" fill="rgba(255,179,0,0.12)" stroke="rgba(255,179,0,0.3)" stroke-width="1"/>
  <text x="365" y="410" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#ffb300">🪪  RFID/NFC</text>
  <rect x="460" y="385" width="150" height="38" rx="19" fill="rgba(0,230,118,0.12)" stroke="rgba(0,230,118,0.3)" stroke-width="1"/>
  <text x="535" y="410" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#00e676">📺  Infrared</text>
  <rect x="630" y="385" width="150" height="38" rx="19" fill="rgba(255,82,82,0.12)" stroke="rgba(255,82,82,0.3)" stroke-width="1"/>
  <text x="705" y="410" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#ff5252">💾  Bad USB</text>
  <rect x="800" y="385" width="160" height="38" rx="19" fill="rgba(206,147,216,0.12)" stroke="rgba(206,147,216,0.3)" stroke-width="1"/>
  <text x="880" y="410" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#ce93d8">📶  Bluetooth</text>
