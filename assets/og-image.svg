  <text x="600" y="510" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" fill="#555570">No real signals — 100% virtual — IT Act 2000 compliant</text>
  <text x="600" y="545" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="600" fill="#00e676">⚡ FlipperEdu · @sudo.learner</text>
